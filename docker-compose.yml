# Optional adapter-development dependencies. The local reference runtime does not
# connect to these services unless a corresponding adapter is implemented and configured.
services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    profiles: ["vector"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    profiles: ["graph"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${SEMANTIC_JUNKYARD_NEO4J_PASSWORD:-semantic-junkyard-dev}
    volumes:
      - neo4j-data:/data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    profiles: ["object-store"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${SEMANTIC_JUNKYARD_MINIO_USER:-semantic-junkyard}
      MINIO_ROOT_PASSWORD: ${SEMANTIC_JUNKYARD_MINIO_PASSWORD:-semantic-junkyard-dev}
    volumes:
      - minio-data:/data

  postgres:
    image: pgvector/pgvector:pg17
    profiles: ["metadata"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SEMANTIC_JUNKYARD_POSTGRES_USER:-semantic_junkyard}
      POSTGRES_PASSWORD: ${SEMANTIC_JUNKYARD_POSTGRES_PASSWORD:-semantic-junkyard-dev}
      POSTGRES_DB: ${SEMANTIC_JUNKYARD_POSTGRES_DB:-semantic_junkyard}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  qdrant-data:
  neo4j-data:
  minio-data:
  postgres-data:
